<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Drakon AI</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* ==================== ANIMATIONS ==================== */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cinematic Light Beam Reveal */
    @keyframes beamExpand {
      0% {
        transform: scaleY(0) skewX(-10deg);
        opacity: 0;
        filter: blur(50px);
      }

      100% {
        transform: scaleY(1) skewX(-15deg);
        opacity: 1;
        filter: blur(15px);
      }
    }

    /* Aurora Pulse */
    @keyframes auroraShift {

      0%,
      100% {
        opacity: 0.3;
        transform: translateX(0) scale(1);
      }

      50% {
        opacity: 0.6;
        transform: translateX(-20px) scale(1.05);
      }
    }

    /* Logo Shimmer */
    @keyframes logoShimmer {
      0% {
        filter: brightness(0.8) drop-shadow(0 0 0px rgba(255, 255, 255, 0));
      }

      50% {
        filter: brightness(1.2) drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
      }

      100% {
        filter: brightness(0.8) drop-shadow(0 0 0px rgba(255, 255, 255, 0));
      }
    }

    /* ==================== BASE STYLES ==================== */
    /* Handled by style.css */

    .page-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ==================== LEFT PANEL ==================== */
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      z-index: 10;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-subtle);
      max-width: 600px;
    }

    .header {
      padding: 32px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .logo i {
      color: var(--accent-primary);
    }

    .signup-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      animation: fadeIn 0.8s ease-out;
    }

    .signup-box {
      width: 100%;
      max-width: 380px;
    }

    .signup-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .signup-subtitle {
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    /* ==================== FORMS & BUTTONS ==================== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition-fast);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--text-secondary);
      background: var(--bg-elevated);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition-fast);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      background: #e5e5e5;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      margin-bottom: 12px;
    }

    .btn-secondary:hover {
      background: var(--bg-bubble);
    }

    /* ==================== RIGHT PANEL (VIDEO STYLE) ==================== */
    .right-panel {
      flex: 1.2;
      background: #000;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Main sharp V-beam from right */
    .v-beam {
      position: absolute;
      top: -20%;
      right: -10%;
      width: 60%;
      height: 140%;
      background: linear-gradient(-85deg,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(100, 150, 255, 0.05) 20%,
          rgba(0, 0, 0, 0) 60%);
      transform-origin: top right;
      animation: beamExpand 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      pointer-events: none;
      z-index: 2;
    }

    /* The 'Glow Source' on the right edge */
    .light-source {
      position: absolute;
      right: -100px;
      top: 10%;
      bottom: 10%;
      width: 300px;
      background: radial-gradient(ellipse at center,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(59, 130, 246, 0.05) 40%,
          transparent 80%);
      filter: blur(60px);
      z-index: 1;
    }

    /* Aurora / Atmosphere Flow */
    #aurora-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.6;
    }

    /* Dynamic Text Styling */
    .dynamic-text-container {
      position: relative;
      z-index: 5;
      max-width: 500px;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .text-backdrop {
      position: absolute;
      width: 400px;
      height: 300px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
      filter: blur(50px);
      z-index: -1;
    }

    .quote-wrapper {
      text-align: center;
    }

    .dynamic-quote {
      font-size: 1.8rem;
      font-weight: 300;
      line-height: 1.5;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 24px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quote-author {
      font-size: 0.9rem;
      color: var(--accent-primary);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .quote-author.visible {
      opacity: 1;
    }

    /* Typewriter cursor */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent-primary);
      margin-left: 4px;
      animation: blink 0.8s infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0;
      }
    }

    /* Text reveal animation */
    @keyframes textGlow {
      0% {
        text-shadow: 0 0 0px rgba(245, 166, 35, 0);
      }

      50% {
        text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
      }

      100% {
        text-shadow: 0 0 0px rgba(245, 166, 35, 0);
      }
    }

    .dynamic-quote.glow {
      animation: textGlow 2s ease-in-out;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 1100px) {
      .signup-content {
        padding: 0 40px;
      }
    }

    @media (max-width: 900px) {
      .right-panel {
        display: none;
      }

      .left-panel {
        max-width: 100%;
      }

      .signup-content {
        align-items: center;
      }
    }
  </style>
</head>

<body class="fade-in-page">
  <!-- YUG Page Loader -->
  <script src="{{ url_for('static', filename='js/loader.js') }}"></script>

  <div class="page-container">
    <!-- Left Panel -->
    <div class="left-panel">
      <a href="{{ url_for('landing.index') }}" style="text-decoration: none;">
        <header class="header">
          <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Drakon Logo" class="logo-img">
            <span>Drakon AI</span>
          </div>
        </header>
      </a>

      <main class="signup-content">
        <div class="signup-box">
          <h1 class="signup-title">Get started</h1>
          <p class="signup-subtitle">Join the future of intelligent creation.</p>

          <div id="auth-options">

            <button class="btn btn-secondary" id="btn-email-trigger">
              <i class="fas fa-envelope"></i>
              <span>Continue with Email</span>
            </button>
          </div>

          <!-- Email Form (Hidden initially if options are shown, but here we show directly) -->
          <div id="email-form" style="display: none; animation: slideUp 0.4s ease-out;">
            <form id="actual-form">
              <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder="Email address" required
                  autocomplete="email">
              </div>
              <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Password" required minlength="6"
                  autocomplete="new-password">
              </div>
              <button type="submit" class="btn btn-primary" id="submit-btn">
                <span>Create account</span>
                <i class="fas fa-arrow-right"></i>
              </button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 0.85rem;">
              <a href="#" id="back-to-options" style="color: var(--text-secondary); text-decoration: none;">
                <i class="fas fa-chevron-left" style="font-size: 0.7rem;"></i> All options
              </a>
            </p>
          </div>

          <!-- OTP Verification Form (Hidden initially) -->
          <div id="otp-form-container" style="display: none; animation: fadeIn 0.4s ease-out;">
            <div style="text-align: center; margin-bottom: 24px;">
              <i class="fas fa-envelope-open-text"
                style="font-size: 2.5rem; color: var(--accent-primary); margin-bottom: 16px;"></i>
              <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 8px;">Verify your email</h2>
              <p style="color: var(--text-secondary); font-size: 0.95rem;">
                We sent a verification code to <strong id="display-email" style="color: var(--text-primary);"></strong>
              </p>
            </div>

            <form id="otp-form">
              <div class="form-group">
                <input type="text" id="otp-input" class="form-input" placeholder="Enter 6-digit code" required
                  pattern="[0-9]{6}" maxlength="6"
                  style="text-align: center; font-size: 1.25rem; letter-spacing: 0.25em;">
              </div>
              <button type="submit" class="btn btn-primary" id="verify-btn">
                <span>Verify Code</span>
                <i class="fas fa-check"></i>
              </button>
            </form>

            <p style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary);">
              Didn't receive the code?
              <a href="#" id="resend-otp-btn"
                style="color: var(--accent-primary); font-weight: 600; text-decoration: none; cursor: pointer;">
                Resend code
              </a>
            </p>
            <p id="resend-msg"
              style="text-align: center; margin-top: 8px; font-size: 0.8rem; color: #10b981; display: none;">Code resent
              successfully!</p>
          </div>

          <div id="login-link-container">
            <p style="margin-top: 32px; font-size: 0.9rem; color: var(--text-secondary); text-align: center;">
              Already have an account? <a href="/login"
                style="color: var(--text-primary); font-weight: 600; text-decoration: none;">Log in</a>
            </p>
          </div>
        </div>
      </main>

      <footer style="padding: 32px 48px; font-size: 0.75rem; color: var(--text-muted); text-align: center;">
        By continuing, you agree to our <a href="#" style="color: inherit; text-decoration: underline;">Terms of
          Service</a> and <a href="#" style="color: inherit; text-decoration: underline;">Privacy Policy</a>.
      </footer>
    </div>

    <!-- Right Panel: Cinematic Lighting -->
    <div class="right-panel">
      <!-- Sharp volumetric beam -->
      <div class="v-beam"></div>

      <!-- Ambient light source -->
      <div class="light-source"></div>

      <!-- Moving atmospheric light -->
      <div id="aurora-container"></div>

      <!-- Dynamic Random Text Display -->
      <div class="dynamic-text-container">
        <div class="text-backdrop"></div>
        <div class="quote-wrapper">
          <p class="dynamic-quote" id="dynamic-quote"></p>
          <span class="quote-author" id="quote-author"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Aurora animation removed to prevent server/browser crash on some systems.
      // Keeping dynamic text and static background.
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnEmailTrigger = document.getElementById('btn-email-trigger');
      const authOptions = document.getElementById('auth-options');
      const emailForm = document.getElementById('email-form');
      const backToOptions = document.getElementById('back-to-options');

      // State variables
      let currentEmail = '';

      btnEmailTrigger.addEventListener('click', () => {
        authOptions.style.display = 'none';
        emailForm.style.display = 'block';
      });

      backToOptions.addEventListener('click', (e) => {
        e.preventDefault();
        emailForm.style.display = 'none';
        authOptions.style.display = 'block';
      });

      // Handle initial signup (OTP Request)
      document.getElementById('actual-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
          alert('Please fill in all fields.');
          return;
        }

        currentEmail = email; // Store for OTP verification
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending code...';

        fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        })
          .then(response => response.json().then(data => ({ status: response.status, data: data })))
          .then(({ status, data }) => {
            btn.disabled = false;
            btn.innerHTML = '<span>Create account</span><i class="fas fa-arrow-right"></i>';

            if (data.status === 'otp_required') {
              // Transition to OTP UI
              document.querySelector('.signup-title').style.display = 'none';
              document.querySelector('.signup-subtitle').style.display = 'none';
              emailForm.style.display = 'none';
              document.getElementById('login-link-container').style.display = 'none';

              document.getElementById('display-email').textContent = email;
              document.getElementById('otp-form-container').style.display = 'block';
              document.getElementById('otp-input').focus();
            } else if (status === 200 || status === 201) {
              // Fallback if OTP is bypassed
              btn.innerHTML = '<i class="fas fa-check"></i> Account Created!';
              btn.style.background = '#10b981';
              btn.style.color = '#fff';
              setTimeout(() => window.location.href = data.redirect_url || '/login', 800);
            } else {
              alert(data.message || 'Signup failed. Please try again.');
            }
          })
          .catch(error => {
            btn.disabled = false;
            btn.innerHTML = '<span>Create account</span><i class="fas fa-arrow-right"></i>';
            console.error('Network Error:', error);
            alert('A network error occurred. Please try again.');
          });
      });

      // Handle OTP Verification
      document.getElementById('otp-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = document.getElementById('verify-btn');
        const otp = document.getElementById('otp-input').value;

        if (!otp || otp.length !== 6) {
          alert('Please enter a valid 6-digit code.');
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';

        fetch('/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, otp: otp })
        })
          .then(response => response.json().then(data => ({ status: response.status, data: data })))
          .then(({ status, data }) => {
            if (status === 200) {
              btn.innerHTML = '<i class="fas fa-check"></i> Verified!';
              btn.style.background = '#10b981';
              btn.style.color = '#fff';
              setTimeout(() => window.location.href = data.redirect_url || '/download', 800);
            } else {
              btn.disabled = false;
              btn.innerHTML = '<span>Verify Code</span><i class="fas fa-check"></i>';
              alert(data.message || 'Verification failed. Invalid code.');
            }
          })
          .catch(error => {
            btn.disabled = false;
            btn.innerHTML = '<span>Verify Code</span><i class="fas fa-check"></i>';
            console.error('Verification Error:', error);
            alert('A network error occurred during verification.');
          });
      });

      // Handle Resend OTP
      document.getElementById('resend-otp-btn').addEventListener('click', (e) => {
        e.preventDefault();
        const resendMsg = document.getElementById('resend-msg');

        fetch('/api/resend-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail })
        })
          .then(response => response.json())
          .then(data => {
            if (data.status === 'success') {
              resendMsg.textContent = 'New code sent successfully!';
              resendMsg.style.color = '#10b981';
              resendMsg.style.display = 'block';
              setTimeout(() => resendMsg.style.display = 'none', 3000);
            } else {
              resendMsg.textContent = data.message || 'Failed to resend code.';
              resendMsg.style.color = '#ef4444';
              resendMsg.style.display = 'block';
            }
          })
          .catch(err => {
            resendMsg.textContent = 'Network error. Could not resend.';
            resendMsg.style.color = '#ef4444';
            resendMsg.style.display = 'block';
          });
      });
    });

    // Dynamic Random Text System
    const quotes = [
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs" },
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Artificial intelligence is the new electricity.", author: "Andrew Ng" },
      { text: "The best way to predict the future is to create it.", author: "Peter Drucker" },
      { text: "Technology is best when it brings people together.", author: "Matt Mullenweg" },
      { text: "The advance of technology is based on making it fit in so you don't notice it.", author: "Bill Gates" },
      { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
      { text: "Code is poetry.", author: "WordPress" },
      { text: "Think different.", author: "Apple" },
      { text: "Move fast and break things.", author: "Mark Zuckerberg" },
      { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" }
    ];

    const quoteElement = document.getElementById('dynamic-quote');
    const authorElement = document.getElementById('quote-author');
    let currentQuoteIndex = 0;

    function getRandomQuote() {
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * quotes.length);
      } while (newIndex === currentQuoteIndex && quotes.length > 1);
      currentQuoteIndex = newIndex;
      return quotes[currentQuoteIndex];
    }

    function typeWriter(text, element, callback) {
      let i = 0;
      element.innerHTML = '<span class="typing-cursor"></span>';

      function type() {
        if (i < text.length) {
          element.innerHTML = text.substring(0, i + 1) + '<span class="typing-cursor"></span>';
          i++;
          setTimeout(type, 40 + Math.random() * 30);
        } else {
          // Remove cursor and add glow
          element.innerHTML = text;
          element.classList.add('glow');
          setTimeout(() => element.classList.remove('glow'), 2000);
          if (callback) callback();
        }
      }
      type();
    }

    function displayQuote() {
      if (!quoteElement) return; // Guard clause if element doesn't exist

      const quote = getRandomQuote();
      if (authorElement) authorElement.classList.remove('visible');

      typeWriter(quote.text, quoteElement, () => {
        if (authorElement) {
          authorElement.textContent = '— ' + quote.author;
          setTimeout(() => authorElement.classList.add('visible'), 500);
        }
      });
    }

    // Initial display and rotation
    setTimeout(displayQuote, 800);
    setInterval(() => {
      displayQuote();
    }, 8000);
  </script>
</body>

</html>
