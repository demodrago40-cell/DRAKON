<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUG Loader</title>
    <style>
        /* From Uiverse.io by SelfMadeSystem - Modified for YUG */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        .absolute {
            position: absolute;
        }

        .inline-block {
            display: inline-block;
        }

        .loader {
            display: flex;
            margin: 0.25em 0;
            gap: 0.5em;
        }

        .w-2 {
            width: 0.5em;
        }

        .dash {
            animation: dashArray 2s ease-in-out infinite,
                dashOffset 2s linear infinite;
        }

        .spin {
            animation: spinDashArray 2s ease-in-out infinite,
                spin 8s ease-in-out infinite,
                dashOffset 2s linear infinite;
            transform-origin: center;
        }

        @keyframes dashArray {
            0% {
                stroke-dasharray: 0 1 359 0;
            }

            50% {
                stroke-dasharray: 0 359 1 0;
            }

            100% {
                stroke-dasharray: 359 1 0 0;
            }
        }

        @keyframes spinDashArray {
            0% {
                stroke-dasharray: 270 90;
            }

            50% {
                stroke-dasharray: 0 360;
            }

            100% {
                stroke-dasharray: 270 90;
            }
        }

        @keyframes dashOffset {
            0% {
                stroke-dashoffset: 365;
            }

            100% {
                stroke-dashoffset: 5;
            }
        }

        @keyframes spin {
            0% {
                rotate: 0deg;
            }

            12.5%,
            25% {
                rotate: 270deg;
            }

            37.5%,
            50% {
                rotate: 540deg;
            }

            62.5%,
            75% {
                rotate: 810deg;
            }

            87.5%,
            100% {
                rotate: 1080deg;
            }
        }
    </style>
</head>

<body>
    <div class="loader">
        <!-- Gradient Definitions -->
        <svg height="0" width="0" viewBox="0 0 64 64" class="absolute">
            <defs xmlns="http://www.w3.org/2000/svg">
                <!-- Y gradient - Purple to Blue -->
                <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="62" x1="0" id="gradient-y">
                    <stop stop-color="#973BED"></stop>
                    <stop stop-color="#007CFF" offset="1"></stop>
                </linearGradient>
                <!-- U gradient - Yellow to Magenta (animated) -->
                <linearGradient gradientUnits="userSpaceOnUse" y2="0" x2="0" y1="64" x1="0" id="gradient-u">
                    <stop stop-color="#FFC800"></stop>
                    <stop stop-color="#F0F" offset="1"></stop>
                    <animateTransform repeatCount="indefinite"
                        keySplines=".42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1;.42,0,.58,1"
                        keyTimes="0; 0.125; 0.25; 0.375; 0.5; 0.625; 0.75; 0.875; 1" dur="8s"
                        values="0 32 32;-270 32 32;-270 32 32;-540 32 32;-540 32 32;-810 32 32;-810 32 32;-1080 32 32;-1080 32 32"
                        type="rotate" attributeName="gradientTransform">
                    </animateTransform>
                </linearGradient>
                <!-- G gradient - Cyan to Green -->
                <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="62" x1="0" id="gradient-g">
                    <stop stop-color="#00E0ED"></stop>
                    <stop stop-color="#00DA72" offset="1"></stop>
                </linearGradient>
            </defs>
        </svg>

        <!-- Letter Y -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64"
            class="inline-block">
            <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#gradient-y)"
                d="M 54.722656,3.9726563 A 2.0002,2.0002 0 0 0 54.941406,4 h 5.007813 C 58.955121,17.046124 49.099667,27.677057 36.121094,29.580078 a 2.0002,2.0002 0 0 0 -1.708985,1.978516 V 60 H 29.587891 V 31.558594 A 2.0002,2.0002 0 0 0 27.878906,29.580078 C 14.900333,27.677057 5.0448787,17.046124 4.0507812,4 H 9.28125 c 1.231666,11.63657 10.984383,20.554048 22.6875,20.734375 a 2.0002,2.0002 0 0 0 0.02344,0 c 11.806958,0.04283 21.70649,-9.003371 22.730469,-20.7617187 z"
                class="dash" pathLength="360">
            </path>
        </svg>

        <!-- Letter U -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64"
            class="inline-block">
            <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#gradient-u)"
                d="M 4,4 h 4.6230469 v 25.919922 c -0.00276,11.916203 9.8364941,21.550422 21.7500001,21.296875 11.616666,-0.240651 21.014356,-9.63894 21.253906,-21.25586 a 2.0002,2.0002 0 0 0 0,-0.04102 V 4 H 56.25 v 25.919922 c 0,14.33873 -11.581192,25.919922 -25.919922,25.919922 a 2.0002,2.0002 0 0 0 -0.0293,0 C 15.812309,56.052941 3.998433,44.409961 4,29.919922 Z"
                class="dash" pathLength="360">
            </path>
        </svg>

        <!-- Letter G -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64" height="64" width="64"
            class="inline-block">
            <path stroke-linejoin="round" stroke-linecap="round" stroke-width="8" stroke="url(#gradient-g)"
                d="M 56,20 C 52,8 42,4 32,4 C 16,4 4,16 4,32 C 4,48 16,60 32,60 C 46,60 56,50 56,36 L 56,32 L 36,32"
                class="dash" pathLength="360">
            </path>
        </svg>
    </div>
</body>

</html>
